<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Air Quality Pro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      transition: background 0.5s ease;
    }

    body.good { background: #d4edda; }
    body.moderate { background: #fff3cd; }
    body.unhealthy { background: #f8d7da; }

    .container {
      max-width: 650px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .credit {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
      font-style: italic;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
    }

    .aqi {
      font-size: 70px;
      font-weight: bold;
      margin: 20px 0;
    }

    .status {
      font-size: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
    }

    .good { background: #d4edda; color: #155724; }
    .moderate { background: #fff3cd; color: #856404; }
    .unhealthy { background: #f8d7da; color: #721c24; }

    #alert {
      font-weight: bold;
      color: red;
      margin-bottom: 10px;
    }

    #details, #update {
      margin-top: 10px;
      font-size: 14px;
    }

    .form-box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Air Quality Pro</h1>
  <p class="credit">Created by Cris</p>

  <!-- CITY SELECT -->
  <select id="citySelect" onchange="changeCity()">
    <option value="13.7563,100.5018">Bangkok</option>
    <option value="18.7883,98.9853">Chiang Mai</option>
    <option value="51.5074,-0.1278">London</option>
    <option value="40.7128,-74.0060">New York</option>
    <option value="35.6895,139.6917">Tokyo</option>
  </select>

  <div id="alert"></div>

  <div class="aqi" id="aqi">--</div>
  <div class="status" id="status">Loading...</div>

  <h3>What you should do:</h3>
  <div id="advice"></div>

  <!-- OPTIONAL FORM -->
  <div class="form-box">
    <h4>Personalize Advice (Optional)</h4>
    <select id="health">
      <option value="normal">I'm healthy</option>
      <option value="sensitive">I have sensitivities (asthma, etc.)</option>
    </select>

    <select id="activity">
      <option value="low">Low outdoor activity</option>
      <option value="high">High outdoor activity</option>
    </select>

    <button onclick="fetchAQI()">Update Advice</button>
  </div>

  <div id="details"></div>
  <div id="update"></div>

  <button onclick="fetchAQI()">Refresh</button>
</div>

<script>
let lat = 13.7563;
let lon = 100.5018;

const apiKey = "1994c56a-cc4a-49f9-93ac-6ad8d846fe02";

function changeCity() {
  const value = document.getElementById("citySelect").value;
  const parts = value.split(",");
  lat = parts[0];
  lon = parts[1];
  fetchAQI();
}

async function fetchAQI() {
  try {
    document.getElementById("status").textContent = "Loading...";

    const res = await fetch(`https://api.airvisual.com/v2/nearest_city?lat=${lat}&lon=${lon}&key=${apiKey}`);
    const data = await res.json();

    if (!data.data) throw new Error();

    const pollution = data.data.current.pollution;
    const aqi = pollution.aqius;

    document.getElementById("aqi").textContent = aqi;

    const status = document.getElementById("status");
    const advice = document.getElementById("advice");
    const alertBox = document.getElementById("alert");
    const body = document.body;

    const health = document.getElementById("health").value;
    const activity = document.getElementById("activity").value;

    let extra = "";

    if (health === "sensitive") {
      extra += " As someone with sensitivities, you should be extra cautious.";
    }

    if (activity === "high") {
      extra += " Since you're active outdoors, consider reducing exposure.";
    }

    if (aqi <= 50) {
      status.textContent = "Good 😊";
      status.className = "status good";
      body.className = "good";
      alertBox.textContent = "";
      advice.textContent = "Air quality is excellent. You can safely exercise outdoors and keep windows open." + extra;

    } else if (aqi <= 100) {
      status.textContent = "Moderate 😐";
      status.className = "status moderate";
      body.className = "moderate";
      alertBox.textContent = "";
      advice.textContent = "Air quality is acceptable, but there may be a risk for sensitive individuals. Consider limiting prolonged outdoor activities." + extra;

    } else if (aqi <= 150) {
      status.textContent = "Unhealthy for Sensitive Groups 😷";
      status.className = "status moderate";
      body.className = "moderate";
      alertBox.textContent = "";
      advice.textContent = "People with respiratory issues should reduce outdoor exertion. Wearing a mask outdoors is recommended." + extra;

    } else if (aqi <= 200) {
      status.textContent = "Unhealthy 😷";
      status.className = "status unhealthy";
      body.className = "unhealthy";
      alertBox.textContent = "⚠️ Health Warning!";
      advice.textContent = "Everyone may begin to experience health effects. Limit outdoor exposure, wear a mask, and consider using an air purifier indoors." + extra;

    } else {
      status.textContent = "Very Unhealthy 🚨";
      status.className = "status unhealthy";
      body.className = "unhealthy";
      alertBox.textContent = "🚨 Severe Air Pollution!";
      advice.textContent = "Avoid outdoor activities completely. Stay indoors with air purification if possible. Keep windows closed." + extra;
    }

    document.getElementById("details").innerHTML =
      `AQI: ${aqi} | Main pollutant: ${pollution.mainus}`;

    document.getElementById("update").textContent =
      "Last updated: " + new Date().toLocaleString();

  } catch {
    document.getElementById("status").textContent = "Error loading data";
    document.getElementById("advice").textContent = "Check API key or internet.";
  }
}

function startApp() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        fetchAQI();
      },
      () => fetchAQI()
    );
  } else {
    fetchAQI();
  }
}

startApp();
setInterval(fetchAQI, 600000);
</script>

</body>
</html>
