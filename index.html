<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Air Quality Pro</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Lexend', sans-serif;
  text-align: center;
  margin: 0;
  transition: background 0.5s ease;
}

/* Background states */
body.good { background: #d4edda; }
body.moderate { background: #fff3cd; }
body.unhealthy { background: #f8d7da; }

/* Container */
.container {
  max-width: 650px;
  margin: 60px auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

/* Credit */
.credit {
  font-size: 14px;
  color: #888;
  margin-bottom: 20px;
}

/* Buttons & inputs */
select {
  padding: 12px 16px;
  margin: 10px;
  border-radius: 12px;
  border: 2px solid #ddd;
  background-color: #f9f9f9;
  font-size: 15px;
  cursor: pointer;
  outline: none;
  min-width: 180px;
  transition: all 0.2s ease;
}

/* Hover effect */
select:hover {
  border-color: #999;
  background-color: #fff;
}

/* When clicked */
select:focus {
  border-color: #007bff;
  box-shadow: 0 0 6px rgba(0,123,255,0.3);
  background-color: #fff;
}

/* Location button */
.location-btn {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;
  cursor: pointer;
}

.location-btn:hover {
  transform: scale(1.05);
}

/* AQI display */
.aqi {
  font-size: 70px;
  font-weight: bold;
  margin: 20px 0;
}

.status {
  font-size: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  display: inline-block;
}

.good { background: #d4edda; color: #155724; }
.moderate { background: #fff3cd; color: #856404; }
.unhealthy { background: #f8d7da; color: #721c24; }

#alert {
  font-weight: bold;
  color: red;
}

/* Form box */
.form-box {
  margin-top: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Air Quality Pro</h1>
  <p class="credit">Created by Cris</p>

  <!-- CITY SELECT -->
  <select id="citySelect" onchange="changeCity()">
    <option value="13.7563,100.5018">Bangkok</option>
    <option value="18.7883,98.9853">Chiang Mai</option>
    <option value="51.5074,-0.1278">London</option>
    <option value="40.7128,-74.0060">New York</option>
    <option value="35.6895,139.6917">Tokyo</option>
  </select>

  <!-- LOCATION BUTTON -->
  <button class="location-btn" onclick="useMyLocation()">
    📍 Use My Location
  </button>

  <div id="alert"></div>

  <div class="aqi" id="aqi">--</div>
  <div class="status" id="status">Loading...</div>

  <h3>What you should do:</h3>
  <div id="advice"></div>

  <!-- OPTIONAL FORM -->
  <div class="form-box">
    <h4>Personalize Advice (Optional)</h4>

    <select id="health">
      <option value="normal">I'm healthy</option>
      <option value="sensitive">Respiratory issues</option>
      <option value="elderly">Elderly</option>
      <option value="child">Child</option>
    </select>

    <select id="activity">
      <option value="low">Mostly indoors</option>
      <option value="high">Very active outdoors</option>
    </select>

    <button onclick="fetchAQI()">Update Advice</button>
  </div>

  <div id="details"></div>
  <div id="update"></div>

  <button onclick="fetchAQI()">Refresh</button>
</div>

<script>
let lat = 13.7563;
let lon = 100.5018;

const apiKey = "1994c56a-cc4a-49f9-93ac-6ad8d846fe02";

/* Change city */
function changeCity() {
  const value = document.getElementById("citySelect").value;
  [lat, lon] = value.split(",");
  fetchAQI();
}

/* Use location */
function useMyLocation() {
  document.getElementById("status").textContent = "Getting your location...";

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        lat = pos.coords.latitude;
        lon = pos.coords.longitude;
        fetchAQI();
      },
      () => alert("Location access denied")
    );
  } else {
    alert("Geolocation not supported");
  }
}

/* Fetch AQI */
async function fetchAQI() {
  try {
    document.getElementById("status").textContent = "Loading...";

    const res = await fetch(`https://api.airvisual.com/v2/nearest_city?lat=${lat}&lon=${lon}&key=${apiKey}`);
    const data = await res.json();

    if (!data.data) throw new Error();

    const pollution = data.data.current.pollution;
    const aqi = pollution.aqius;

    document.getElementById("aqi").textContent = aqi;

    const status = document.getElementById("status");
    const advice = document.getElementById("advice");
    const alertBox = document.getElementById("alert");
    const body = document.body;

    /* Form values (optional safe defaults) */
    const health = document.getElementById("health")?.value || "normal";
    const activity = document.getElementById("activity")?.value || "low";

    let extra = "";

    if (health === "sensitive") {
      extra += " You may experience breathing discomfort even at moderate levels.";
    } else if (health === "elderly") {
      extra += " Older adults are at higher risk — limit exposure and stay indoors when possible.";
    } else if (health === "child") {
      extra += " Children are more vulnerable — reduce outdoor play in poor air.";
    }

    if (activity === "high") {
      extra += " Since you're active outdoors, consider reducing intensity or duration.";
    }

    /* AQI levels */
    if (aqi <= 50) {
      status.textContent = "Good 😊";
      status.className = "status good";
      body.className = "good";
      alertBox.textContent = "";
      advice.textContent = "Air quality is excellent. Enjoy outdoor activities freely." + extra;

    } else if (aqi <= 100) {
      status.textContent = "Moderate 😐";
      status.className = "status moderate";
      body.className = "moderate";
      alertBox.textContent = "";
      advice.textContent = "Air is acceptable, but sensitive individuals should take caution." + extra;

    } else if (aqi <= 150) {
      status.textContent = "Unhealthy for Sensitive 😷";
      status.className = "status moderate";
      body.className = "moderate";
      alertBox.textContent = "";
      advice.textContent = "Sensitive groups should limit outdoor exposure." + extra;

    } else if (aqi <= 200) {
      status.textContent = "Unhealthy 😷";
      status.className = "status unhealthy";
      body.className = "unhealthy";
      alertBox.textContent = "⚠️ Health Warning!";
      advice.textContent = "Limit outdoor activity. Consider masks and air purifiers." + extra;

    } else {
      status.textContent = "Very Unhealthy 🚨";
      status.className = "status unhealthy";
      body.className = "unhealthy";
      alertBox.textContent = "🚨 Severe Pollution!";
      advice.textContent = "Stay indoors. Avoid outdoor exposure completely." + extra;
    }

    document.getElementById("details").innerHTML =
      `AQI: ${aqi} | Pollutant: ${pollution.mainus}`;

    document.getElementById("update").textContent =
      "Last updated: " + new Date().toLocaleString();

  } catch {
    document.getElementById("status").textContent = "Error loading data";
    document.getElementById("advice").textContent = "Check API key or internet.";
  }
}

/* Start */
fetchAQI();
setInterval(fetchAQI, 600000);
</script>

</body>
</html>
