<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Air Quality App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      transition: background 0.5s ease;
    }

    body.good { background: #d4edda; }
    body.moderate { background: #fff3cd; }
    body.unhealthy { background: #f8d7da; }

    .container {
      max-width: 600px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    h1 { margin-bottom: 5px; }

    .credit {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
      font-style: italic;
    }

    select {
      padding: 8px;
      margin: 10px;
      border-radius: 8px;
    }

    #alert {
      font-weight: bold;
      margin-bottom: 10px;
      color: red;
    }

    .aqi {
      font-size: 72px;
      font-weight: bold;
      margin: 20px 0;
    }

    .status {
      font-size: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 15px;
    }

    .good { background: #d4edda; color: #155724; }
    .moderate { background: #fff3cd; color: #856404; }
    .unhealthy { background: #f8d7da; color: #721c24; }

    #details { margin-top: 10px; }
    #update { margin-top: 15px; font-size: 13px; color: #666; }

    .refresh-btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    .refresh-btn:hover { background: #0056b3; }
  </style>
</head>

<body>

<div class="container">
  <h1>Air Quality App</h1>
  <p class="credit">Created by Cris</p>

  <!-- City Selector -->
  <select id="citySelect" onchange="changeCity()">
    <option value="13.7563,100.5018">Bangkok</option>
    <option value="18.7883,98.9853">Chiang Mai</option>
    <option value="51.5074,-0.1278">London</option>
    <option value="40.7128,-74.0060">New York</option>
    <option value="35.6895,139.6917">Tokyo</option>
  </select>

  <!-- User Type -->
  <select id="userType" onchange="fetchAQI()">
    <option value="normal">Normal</option>
    <option value="asthma">Asthma</option>
    <option value="athlete">Athlete</option>
    <option value="elderly">Elderly</option>
  </select>

  <p id="userLabel"></p>

  <div id="alert"></div>

  <div class="aqi" id="aqi">--</div>
  <div class="status" id="status">Loading...</div>

  <div>
    <strong>What you should do:</strong>
    <div id="advice"></div>
  </div>

  <div id="details"></div>
  <div id="update"></div>

  <button class="refresh-btn" onclick="fetchAQI()">Refresh Now</button>
</div>

<script>
  let lat = 13.7563;
  let lon = 100.5018;

  const apiKey = "1994c56a-cc4a-49f9-93ac-6ad8d846fe02";

  function changeCity() {
    const value = document.getElementById("citySelect").value;
    const parts = value.split(",");
    lat = parts[0];
    lon = parts[1];
    fetchAQI();
  }

  async function fetchAQI() {
    try {
      const userType = document.getElementById("userType").value;

      document.getElementById("status").textContent = "Loading...";
      document.getElementById("advice").textContent = "";

      const res = await fetch(`https://api.airvisual.com/v2/nearest_city?lat=${lat}&lon=${lon}&key=${apiKey}`);
      const data = await res.json();

      if (!data.data) throw new Error();

      const aqi = data.data.current.pollution.aqius;

      document.getElementById("aqi").textContent = aqi;
      document.getElementById("userLabel").textContent = "Advice for: " + userType;

      const status = document.getElementById("status");
      const advice = document.getElementById("advice");
      const alertBox = document.getElementById("alert");
      const body = document.body;

      function setAdvice(general, athlete, asthma, elderly) {
        if (userType === "athlete") return athlete;
        if (userType === "asthma") return asthma;
        if (userType === "elderly") return elderly;
        return general;
      }

      if (aqi <= 50) {
        status.textContent = "Good 😊";
        status.className = "status good";
        advice.textContent = setAdvice(
          "Great air quality. Enjoy outside!",
          "Perfect for outdoor training.",
          "Safe, but carry inhaler.",
          "Nice day for a walk."
        );
        body.className = "good";
        alertBox.textContent = "";

      } else if (aqi <= 100) {
        status.textContent = "Moderate 😐";
        status.className = "status moderate";
        advice.textContent = setAdvice(
          "Air is okay. Limit long exposure.",
          "Light training only.",
          "Be cautious outdoors.",
          "Avoid long outdoor time."
        );
        body.className = "moderate";
        alertBox.textContent = "";

      } else if (aqi <= 150) {
        status.textContent = "Unhealthy (Sensitive) 😷";
        status.className = "status moderate";
        advice.textContent = setAdvice(
          "Reduce outdoor activity.",
          "Avoid outdoor workouts.",
          "Stay indoors if possible.",
          "Avoid going outside."
        );

      } else if (aqi <= 200) {
        status.textContent = "Unhealthy 😷";
        status.className = "status unhealthy";
        advice.textContent = setAdvice(
          "Wear a mask outside.",
          "No outdoor training.",
          "Stay indoors.",
          "Avoid outside completely."
        );
        body.className = "unhealthy";
        alertBox.textContent = "⚠️ High pollution!";

      } else {
        status.textContent = "Very Unhealthy 🚨";
        status.className = "status unhealthy";
        advice.textContent = setAdvice(
          "Stay indoors.",
          "Cancel all outdoor activity.",
          "Dangerous air. Stay inside.",
          "Stay inside at all times."
        );
        body.className = "unhealthy";
        alertBox.textContent = "🚨 Severe pollution!";
      }

      const pollution = data.data.current.pollution;
      document.getElementById("details").innerHTML =
        `AQI: ${pollution.aqius} | Main pollutant: ${pollution.mainus}`;

      document.getElementById("update").textContent =
        "Last updated: " + new Date().toLocaleString();

    } catch {
      document.getElementById("status").textContent = "Error loading data";
      document.getElementById("advice").textContent = "Check API key or internet.";
    }
  }

  function startApp() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          lat = pos.coords.latitude;
          lon = pos.coords.longitude;
          fetchAQI();
        },
        () => fetchAQI()
      );
    } else {
      fetchAQI();
    }
  }

  startApp();
  setInterval(fetchAQI, 600000);
</script>

</body>
</html>
